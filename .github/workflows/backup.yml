name: Daily Database Backup

on:
  schedule:
    # Roda todo dia às 6:00 UTC (3:00 AM no Brasil)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/backup.js

      - name: Commit and push backup
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "chore: automated backup $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Delete old backups (keep last 30 days)
        run: |
          find backups/ -name "backup-*.json" -mtime +30 -delete
          git add backups/
          git diff --staged --quiet || git commit -m "chore: remove backups older than 30 days"
          git push
