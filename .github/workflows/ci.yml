name: CI

on:
  pull_request:
  push:
    branches: [ main, audit/cleanup ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build
        run: npm run build
